# Локальный запуск собранного образа: docker compose up --build
# Виджет: http://localhost:8080/widget/
# Лоадер: http://localhost:8080/loader.js
#
# Для разработки с mock-сервером: pnpm dev:mock
services:
  bankchat:
    build:
      context: .
    image: bankchat:local
    ports:
      - "8080:8080"
    environment:
      NGINX_PORT: "8080"
      # Прокси API на MatrixKC. Раскомментируйте и укажите адрес бэкенда, чтобы
      # виджет ходил в /_matrix через nginx. Без этого — только статика.
      # MATRIX_BACKEND: "http://host.docker.internal:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
